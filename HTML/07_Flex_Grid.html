<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            background-color: red;
            width: 100px;
            height: 100px;
        }

        .container {
            display: grid;
            grid-template-columns: 100px 100px 150px;
            column-gap: 1px;
            row-gap: 1px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box item">eins</div>
        <div class="box">drei</div>
        <div class="box">zwei</div>
        <div class="box">eins</div>
        <div class="box">1</div>

    </div>
</body>

</html>
